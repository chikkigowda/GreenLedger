<html lang="en">

<title>GreenLedger — Foundation Book Tracker</title>

<style>
  :root {
    --green-deep: #1a3a2a; --green-mid: #2d6a4f; --green-light: #52b788;
    --green-pale: #d8f3dc; --amber: #f4a261; --amber-light: #fff3e0;
    --cream: #faf7f2; --ink: #1a1a2e; --ink-soft: #4a4a6a; --white: #ffffff;
    --border: #e8e4dc; --shadow: 0 4px 24px rgba(26,58,42,0.10);
    --shadow-lg: 0 8px 40px rgba(26,58,42,0.16); --radius: 16px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  #loading-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 60%, var(--green-light) 100%);
    flex-direction: column; gap: 16px;
  }
  .loader-logo { font-family: 'DM Serif Display', serif; color: white; font-size: 28px; }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { color: rgba(255,255,255,0.7); font-size: 14px; }
